<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Oyunu</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
    }
    h1 { color: #00ff88; margin-bottom: 10px; }
    #score { font-size: 20px; margin-bottom: 10px; }
    canvas {
      border: 3px solid #00ff88;
      border-radius: 8px;
    }
    #msg {
      margin-top: 15px;
      font-size: 16px;
      color: #aaa;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      color: #00ff88;
      text-decoration: none;
      border: 1px solid #00ff88;
      padding: 8px 16px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>🐍 Snake</h1>
  <div id="score">Xal: 0</div>
  <canvas id="c" width="400" height="400"></canvas>
  <div id="msg">Başlamaq üçün istənilən düyməyə bas</div>
  <a href="../index.html">← Geri</a>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const box = 20;
  let snake, dir, food, score, game, started;

  function init() {
    snake = [{x: 10, y: 10}];
    dir = {x: 1, y: 0};
    score = 0;
    started = false;
    document.getElementById('score').textContent = 'Xal: 0';
    document.getElementById('msg').textContent = 'Başlamaq üçün istənilən düyməyə bas';
    placeFood();
    draw();
  }

  function placeFood() {
    food = {
      x: Math.floor(Math.random() * 20),
      y: Math.floor(Math.random() * 20)
    };
  }

  function draw() {
    ctx.fillStyle = '#0f0f23';
    ctx.fillRect(0, 0, 400, 400);

    // Food
    ctx.fillStyle = '#ff4757';
    ctx.beginPath();
    ctx.arc(food.x * box + box/2, food.y * box + box/2, box/2 - 2, 0, Math.PI*2);
    ctx.fill();

    // Snake
    snake.forEach((seg, i) => {
      ctx.fillStyle = i === 0 ? '#00ff88' : '#00cc66';
      ctx.beginPath();
      ctx.roundRect(seg.x * box + 1, seg.y * box + 1, box - 2, box - 2, 4);
      ctx.fill();
    });
  }

  function update() {
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      clearInterval(game);
      document.getElementById('msg').textContent = '💀 Oyun bitti! Yenidən başlamaq üçün Enter bas';
      return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById('score').textContent = 'Xal: ' + score;
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  document.addEventListener('keydown', e => {
    if (!started && e.key === 'Enter') { init(); return; }
    if (!started) {
      started = true;
      document.getElementById('msg').textContent = '🎮 WASD və ya ox düymələri ilə idarə et';
      game = setInterval(update, 120);
    }
    if ((e.key === 'ArrowUp' || e.key === 'w') && dir.y === 0) dir = {x:0,y:-1};
    if ((e.key === 'ArrowDown' || e.key === 's') && dir.y === 0) dir = {x:0,y:1};
    if ((e.key === 'ArrowLeft' || e.key === 'a') && dir.x === 0) dir = {x:-1,y:0};
    if ((e.key === 'ArrowRight' || e.key === 'd') && dir.x === 0) dir = {x:1,y:0};
    if (e.key === 'Enter') init();
  });

  init();
</script>
</body>
</html>
