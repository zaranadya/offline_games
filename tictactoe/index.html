<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<style>
body { background:#1a1a2e; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; font-family:Arial,sans-serif; color:white; }
h1 { color:#00ff88; }
#status { font-size:1.2em; margin:10px 0; color:#aaa; }
.board { display:grid; grid-template-columns:repeat(3,100px); gap:8px; margin:20px 0; }
.cell { width:100px; height:100px; background:#16213e; border:2px solid #00ff88; border-radius:10px; font-size:2.5em; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:0.2s; }
.cell:hover { background:#0f3460; }
.cell.x { color:#ff4757; }
.cell.o { color:#00ff88; }
button { margin-top:10px; padding:10px 24px; background:#00ff88; color:#1a1a2e; border:none; border-radius:8px; font-size:1em; cursor:pointer; font-weight:bold; }
button:hover { background:#00cc66; }
a { margin-top:20px; color:#00ff88; text-decoration:none; border:1px solid #00ff88; padding:8px 16px; border-radius:6px; }
</style>
</head>
<body>
<h1>❌ Tic-Tac-Toe</h1>
<div id="status">X-in növbəsi</div>
<div class="board" id="board"></div>
<button onclick="reset()">Yenidən Oyna</button>
<a href="../index.html">← Geri</a>

<script>
let board = Array(9).fill('');
let current = 'X';
let over = false;
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function render() {
const el = document.getElementById('board');
el.innerHTML = '';
board.forEach((v, i) => {
const cell = document.createElement('div');
cell.className = 'cell' + (v ? ' ' + v.toLowerCase() : '');
cell.textContent = v;
cell.onclick = () => play(i);
el.appendChild(cell);
});
}

function play(i) {
if (over || board[i]) return;
board[i] = current;
const w = wins.find(([a,b,c]) => board[a] && board[a]===board[b] && board[b]===board[c]);
if (w) {
document.getElementById('status').textContent = current + ' Qazandı! 🎉';
over = true;
} else if (board.every(v => v)) {
document.getElementById('status').textContent = 'Bərabərə! 🤝';
over = true;
} else {
current = current === 'X' ? 'O' : 'X';
document.getElementById('status').textContent = current + '-in növbəsi';
}
render();
}

function reset() {
board = Array(9).fill('');
current = 'X';
over = false;
document.getElementById('status').textContent = 'X-in növbəsi';
render();
}

render();
</script>
</body>
</html>
